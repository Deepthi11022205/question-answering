<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NLP Q&A System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f0e11;
      --surface: #18171c;
      --surface2: #211f27;
      --border: rgba(255,255,255,0.07);
      --accent: #a78bfa;
      --accent2: #f0abfc;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --text: #e8e6f0;
      --muted: rgba(232,230,240,0.45);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 65%);
      top: -200px; left: -200px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(240,171,252,0.05) 0%, transparent 65%);
      bottom: -100px; right: -100px;
      pointer-events: none;
    }

    /* ---- HEADER ---- */
    header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
    }

    .logo-badge {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .header-text h1 {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .model-tag {
      margin-left: auto;
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.25);
      color: var(--accent);
      font-size: 10px;
      padding: 5px 12px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    /* ---- MAIN LAYOUT ---- */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* ---- TABS ---- */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 32px;
      width: fit-content;
    }

    .tab {
      padding: 8px 20px;
      border-radius: 7px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .tab.active {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* ---- INPUT SECTION ---- */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    textarea, input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
      width: 100%;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: rgba(167,139,250,0.5);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.08);
    }

    textarea::placeholder, input::placeholder {
      color: rgba(232,230,240,0.2);
    }

    #context-area {
      min-height: 120px;
      line-height: 1.6;
    }

    #question-input {
      font-size: 15px;
      padding: 16px 18px;
    }

    /* ---- ASK BUTTON ---- */
    .ask-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0f0e11;
      border: none;
      border-radius: 10px;
      padding: 16px 32px;
      font-family: 'Fraunces', serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      align-self: flex-start;
    }

    .ask-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(167,139,250,0.35);
    }

    .ask-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .ask-btn .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- ANSWER CARD ---- */
    .answer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-top: 8px;
      display: none;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .answer-card.visible { display: block; }

    .answer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .answer-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta-badges {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .badge {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.5px;
    }

    .badge.confidence-high { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); color: var(--green); }
    .badge.confidence-mid { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25); color: var(--yellow); }
    .badge.confidence-low { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--red); }
    .badge.time { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); }

    .answer-text {
      font-family: 'Fraunces', serif;
      font-size: 26px;
      font-weight: 300;
      line-height: 1.4;
      color: var(--text);
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-bottom: 16px;
    }

    .confidence-bar-wrap {
      margin-top: 12px;
    }

    .confidence-bar-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .confidence-bar {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s ease;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    /* ---- HISTORY ---- */
    .history-section {
      margin-top: 40px;
    }

    .history-title {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .history-item:hover {
      border-color: rgba(167,139,250,0.3);
      background: var(--surface2);
    }

    .history-q {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-a {
      font-family: 'Fraunces', serif;
      font-size: 14px;
      color: var(--text);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-conf {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ---- ERROR ---- */
    .error-card {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--red);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .error-card.visible { display: block; }

    /* ---- EXAMPLE QUESTIONS ---- */
    .examples {
      margin-bottom: 28px;
    }

    .examples-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .examples-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .example-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Mono', monospace;
    }

    .example-chip:hover {
      border-color: rgba(167,139,250,0.4);
      color: var(--accent);
      background: rgba(167,139,250,0.07);
    }

    /* ---- CONTEXT MODE ---- */
    #context-panel { display: none; }
    #context-panel.active { display: block; }

  </style>
</head>
<body>

  <header>
    <div class="logo-badge">🧠</div>
    <div class="header-text">
      <h1>NLP Question Answering System</h1>
      <p>// Powered by DistilBERT Transformer</p>
    </div>
    <span class="model-tag">distilbert-base-cased-distilled-squad</span>
  </header>

  <div class="container">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('general')">General Q&A</button>
      <button class="tab" onclick="switchTab('context')">Context-Based Q&A</button>
    </div>

    <!-- Example Questions -->
    <div class="examples">
      <p class="examples-label">Try an example</p>
      <div class="examples-list" id="example-chips"></div>
    </div>

    <!-- Context Panel (hidden by default) -->
    <div id="context-panel">
      <div class="input-group" style="margin-bottom:16px;">
        <label>Your Context / Paragraph</label>
        <textarea id="context-area" placeholder="Paste any paragraph here... e.g. a Wikipedia article, your notes, a news story. Then ask a question about it below."></textarea>
      </div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <div class="input-group">
        <label>Your Question</label>
        <input type="text" id="question-input" placeholder="Ask anything..." autocomplete="off" />
      </div>
      <button class="ask-btn" onclick="askQuestion()" id="ask-btn">
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">Ask Question →</span>
      </button>
    </div>

    <!-- Error -->
    <div class="error-card" id="error-card"></div>

    <!-- Answer Card -->
    <div class="answer-card" id="answer-card">
      <div class="answer-header">
        <span class="answer-label">Answer</span>
        <div class="meta-badges">
          <span class="badge time" id="time-badge">0ms</span>
          <span class="badge" id="conf-badge">0%</span>
        </div>
      </div>
      <div class="answer-text" id="answer-text">—</div>
      <div class="confidence-bar-wrap">
        <div class="confidence-bar-label">
          <span>Confidence</span>
          <span id="conf-pct">0%</span>
        </div>
        <div class="confidence-bar">
          <div class="confidence-fill" id="conf-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- History -->
    <div class="history-section" id="history-section" style="display:none">
      <p class="history-title">Previous Questions</p>
      <div class="history-list" id="history-list"></div>
    </div>

  </div>

  <script>
    let currentTab = 'general';
    let history = [];

    const generalExamples = [
      "Who created Python?",
      "What is machine learning?",
      "When was Google founded?",
      "What is deep learning?",
      "Who founded Facebook?",
      "What is NLP?",
    ];

    const contextExamples = [
      "What is the main topic?",
      "Who is mentioned in the text?",
      "When did this happen?",
      "What is the purpose?",
    ];

    function renderChips() {
      const chips = currentTab === 'general' ? generalExamples : contextExamples;
      const container = document.getElementById('example-chips');
      container.innerHTML = chips.map(q =>
        `<span class="example-chip" onclick="setQuestion('${q}')">${q}</span>`
      ).join('');
    }

    function setQuestion(q) {
      document.getElementById('question-input').value = q;
      document.getElementById('question-input').focus();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'general') || (i === 1 && tab === 'context'));
      });
      const panel = document.getElementById('context-panel');
      panel.classList.toggle('active', tab === 'context');
      renderChips();
      clearAnswer();
    }

    function clearAnswer() {
      document.getElementById('answer-card').classList.remove('visible');
      document.getElementById('error-card').classList.remove('visible');
    }

    async function askQuestion() {
      const question = document.getElementById('question-input').value.trim();
      const context = document.getElementById('context-area').value.trim();

      if (!question) {
        showError("Please type a question first!");
        return;
      }

      if (currentTab === 'context' && !context) {
        showError("Please provide a context paragraph first!");
        return;
      }

      setLoading(true);
      clearAnswer();

      try {
        const payload = { question };
        if (currentTab === 'context' && context) payload.context = context;

        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.error) {
          showError(data.error);
        } else {
          showAnswer(data, question);
          addToHistory(question, data);
        }
      } catch (e) {
        showError("Could not connect to the server. Make sure Flask is running!");
      } finally {
        setLoading(false);
      }
    }

    function showAnswer(data, question) {
      const card = document.getElementById('answer-card');
      document.getElementById('answer-text').textContent = data.answer;
      document.getElementById('time-badge').textContent = `${data.time_ms}ms`;

      const conf = data.confidence;
      const confBadge = document.getElementById('conf-badge');
      confBadge.textContent = `${conf}% confidence`;
      confBadge.className = 'badge ' + (conf >= 70 ? 'confidence-high' : conf >= 40 ? 'confidence-mid' : 'confidence-low');

      document.getElementById('conf-pct').textContent = `${conf}%`;
      document.getElementById('conf-fill').style.width = `${conf}%`;

      card.classList.add('visible');
    }

    function showError(msg) {
      const el = document.getElementById('error-card');
      el.textContent = '⚠ ' + msg;
      el.classList.add('visible');
    }

    function setLoading(state) {
      const btn = document.getElementById('ask-btn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btn-text');
      btn.disabled = state;
      spinner.style.display = state ? 'block' : 'none';
      btnText.textContent = state ? 'Thinking...' : 'Ask Question →';
    }

    function addToHistory(question, data) {
      history.unshift({ question, answer: data.answer, confidence: data.confidence });
      if (history.length > 8) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const section = document.getElementById('history-section');
      const list = document.getElementById('history-list');
      if (history.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      list.innerHTML = history.map((h, i) => `
        <div class="history-item" onclick="setQuestion('${h.question.replace(/'/g, "\\'")}')">
          <div>
            <div class="history-q">${h.question}</div>
            <div class="history-a">${h.answer}</div>
          </div>
          <span class="history-conf">${h.confidence}%</span>
        </div>
      `).join('');
    }

    // Enter key support
    document.addEventListener('DOMContentLoaded', () => {
      renderChips();
      document.getElementById('question-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') askQuestion();
      });
    });
  </script>
</body>
</html>
